<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalid Carvalho</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0D1526;
      color: #FFFFFF;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      width: 88px;
      height: 88px;
    }

    .avatar-wrap img {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #1A56DB;
      display: block;
    }

    .avatar-placeholder {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #1A56DB;
      border: 2px solid #1A56DB;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
    }

    /* Header */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
    }

    .name {
      font-size: 22px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.3px;
    }

    .handle {
      font-size: 14px;
      font-weight: 500;
      color: #9BB3E8;
    }

    .tagline {
      font-size: 14px;
      font-weight: 400;
      color: #9BB3E8;
      line-height: 1.5;
      max-width: 300px;
      text-align: center;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: #1E2E4A;
    }

    /* Buttons */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s ease, transform 0.1s ease;
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .btn-primary {
      background: #1A56DB;
      color: #FFFFFF;
    }

    .btn-secondary {
      background: transparent;
      color: #FFFFFF;
      border: 1px solid #1E2E4A;
    }

    .btn-secondary:hover {
      border-color: #1A56DB;
    }

    .btn-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* Section label */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #3A4D6E;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      text-align: center;
      width: 100%;
    }

    /* Footer */
    .footer {
      font-size: 12px;
      color: #3A4D6E;
      text-align: center;
    }
  </style>
</head>
<body>

    </div>

    <!-- Footer -->

  </div>
</body>
</html>
