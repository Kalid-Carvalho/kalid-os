<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ChoraManaus — Template Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: #000;
}

.post {
  width: 1080px;
  height: 1080px;
  position: relative;
  overflow: hidden;
}

/* FOTO DE FUNDO */
.bg-photo {
  position: absolute;
  inset: 0;
  background: url('https://images.unsplash.com/photo-1540039155733-5bb30b53aa14?w=1080&q=90') center top/cover no-repeat;
}

/* Gradiente suave na base */
.bg-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.0)  0%,
    rgba(0,0,0,0.0)  30%,
    rgba(0,0,0,0.65) 58%,
    rgba(0,0,0,0.95) 100%
  );
}

/* LOGO — canto superior direito */
.logo {
  position: absolute;
  top: 36px;
  right: 42px;
  text-align: right;
  z-index: 10;
  line-height: 1;
}

.logo-top {
  font-family: 'Anton', sans-serif;
  font-size: 36px;
  color: #fff;
  letter-spacing: 1px;
  text-transform: uppercase;
  display: block;
}

.logo-bottom {
  font-family: 'Anton', sans-serif;
  font-size: 36px;
  color: #F9C41A;
  letter-spacing: 1px;
  text-transform: uppercase;
  display: block;
}

/* CONTEÚDO INFERIOR */
.content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 10;
  padding: 0 48px 46px;
}

/* Categoria — substituindo "EXCLUSIVO!" */
.categoria {
  display: inline-block;
  background: #1E7A47;
  color: #fff;
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  padding: 6px 16px;
  border-radius: 3px;
  margin-bottom: 18px;
}

/* Manchete — factual, sem clickbait */
.headline {
  font-family: 'Inter', sans-serif;
  font-size: 34px;
  font-weight: 900;
  color: #fff;
  text-transform: uppercase;
  line-height: 1.25;
  letter-spacing: 0.2px;
  margin-bottom: 18px;
}

/* Fonte da notícia */
.fonte {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 22px;
}

.fonte span {
  color: rgba(255,255,255,0.85);
}

/* Separador + handle */
.rodape {
  display: flex;
  align-items: center;
  gap: 14px;
  border-top: 1px solid rgba(255,255,255,0.15);
  padding-top: 18px;
}

.handle {
  font-family: 'Anton', sans-serif;
  font-size: 20px;
  color: #F9C41A;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
}

.data {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
}
</style>
</head>
<body>

<div class="post">
  <div class="bg-photo"></div>
  <div class="bg-gradient"></div>

  <!-- LOGO -->
  <div class="logo">
    <span class="logo-top">CHORA</span>
    <span class="logo-bottom">MANAUS</span>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">
    <div class="categoria">Entretenimento</div>
    <p class="headline">
      Show internacional do<br>
      Black Eyed Peas pode<br>
      acontecer em Manaus em 2026.
    </p>
    <p class="fonte">Fonte: <span>Secretaria Municipal de Cultura</span></p>
    <div class="rodape">
      <span class="handle">@choramanaus</span>
      <div class="dot"></div>
      <span class="data">27 Abr 2026</span>
    </div>
  </div>
</div>

</body>
</html>
