<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ChoraManaus — Template Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: #000;
}

.post {
  width: 1080px;
  height: 1080px;
  position: relative;
  overflow: hidden;
}

/* FOTO DE FUNDO — ocupa tudo */
.bg-photo {
  position: absolute;
  inset: 0;
  background: url('https://images.unsplash.com/photo-1540039155733-5bb30b53aa14?w=1080&q=90') center top/cover no-repeat;
}

/* Gradiente embaixo para o texto aparecer */
.bg-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.0) 0%,
    rgba(0,0,0,0.0) 35%,
    rgba(0,0,0,0.75) 60%,
    rgba(0,0,0,0.97) 100%
  );
}

/* LOGO — canto superior direito */
.logo {
  position: absolute;
  top: 36px;
  right: 40px;
  text-align: right;
  z-index: 10;
  line-height: 1;
}

.logo-top {
  font-family: 'Anton', sans-serif;
  font-size: 38px;
  color: #fff;
  letter-spacing: 1px;
  text-transform: uppercase;
  display: block;
}

.logo-bottom {
  font-family: 'Anton', sans-serif;
  font-size: 38px;
  color: #F9C41A;
  letter-spacing: 1px;
  text-transform: uppercase;
  display: block;
}

/* CONTEÚDO INFERIOR */
.content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 10;
  padding: 0 48px 50px;
  text-align: center;
}

/* Tag tipo "EXCLUSIVO!" */
.tag {
  font-family: 'Anton', sans-serif;
  font-size: 62px;
  color: #F9C41A;
  text-transform: uppercase;
  letter-spacing: 2px;
  line-height: 1;
  margin-bottom: 16px;
  display: block;
}

/* Manchete */
.headline {
  font-family: 'Inter', sans-serif;
  font-size: 30px;
  font-weight: 800;
  color: #fff;
  text-transform: uppercase;
  line-height: 1.3;
  letter-spacing: 0.3px;
  margin-bottom: 28px;
}

/* Handle */
.handle {
  font-family: 'Anton', sans-serif;
  font-size: 22px;
  color: #fff;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  opacity: 0.9;
}

.handle span {
  color: #F9C41A;
}
</style>
</head>
<body>

<div class="post">
  <div class="bg-photo"></div>
  <div class="bg-gradient"></div>

  <!-- LOGO TOPO DIREITO -->
  <div class="logo">
    <span class="logo-top">CHORA</span>
    <span class="logo-bottom">MANAUS</span>
  </div>

  <!-- TEXTO INFERIOR -->
  <div class="content">
    <span class="tag">EXCLUSIVO!</span>
    <p class="headline">
      Fonte confiável afirma que ainda este ano<br>
      Manaus pode receber um show internacional<br>
      do grupo "Black Eyed Peas".
    </p>
    <div class="handle">@<span>CHORAMANAUS</span></div>
  </div>
</div>

</body>
</html>
