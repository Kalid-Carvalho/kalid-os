<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
    <!-- Fundo Escuro com bordas levemente arredondadas -->
    <rect width="120" height="120" rx="24" fill="#0A0711" />
    
    <!-- Efeito de brilho (shadow) ao redor da letra G -->
    <text x="60" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="900" fill="#cdff00" text-anchor="middle" style="text-shadow: 0px 0px 15px rgba(205,255,0,0.6);">G</text>
</svg>
