<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; background: #0A0A0A; font-family: 'Space Grotesk', sans-serif; overflow: hidden; position: relative; }
.slide { position: absolute; inset: 0; padding: 80px; display: flex; flex-direction: column; justify-content: space-between; }
.top { display: flex; justify-content: space-between; align-items: center; }
.slide-num { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; }
.tag { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: #1A56DB; letter-spacing: 0.1em; text-transform: uppercase; }
.middle { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 0; padding: 40px 0; }
.accent-line { width: 40px; height: 3px; background: #1A56DB; border-radius: 2px; margin-bottom: 48px; }
.label { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; color: #1A56DB; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 28px; }
.text-muted { font-size: 40px; font-weight: 400; color: rgba(255,255,255,0.45); line-height: 1.45; margin-bottom: 36px; }
.highlight { font-size: 46px; font-weight: 700; color: #FFFFFF; line-height: 1.35; margin-bottom: 36px; display: block; }
.tools { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 8px; }
.tool { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 600; color: #1A56DB; background: rgba(26,86,219,0.1); border: 1px solid rgba(26,86,219,0.25); border-radius: 6px; padding: 8px 18px; }
.bottom { display: flex; align-items: center; justify-content: space-between; }
.watermark { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.18); }
.swipe { font-size: 15px; font-weight: 400; color: rgba(255,255,255,0.25); }
</style>
</head>
<body>
<div class="slide">
  <div class="top">
    <span class="slide-num">03 / 09</span>
    <span class="tag">Sistema 01</span>
  </div>
  <div class="middle">
    <div class="accent-line"></div>
    <div class="label">SDR Automático</div>
    <div class="text-muted">Busca empresas no Google, valida WhatsApp, lê o site de cada uma e escreve uma mensagem específica pro negócio delas antes de disparar.</div>
    <span class="highlight">Descrito no VS Code,<br>executado pelo Claude.</span>
    <div class="tools">
      <span class="tool">SerpAPI</span>
      <span class="tool">Jina AI</span>
      <span class="tool">OpenAI</span>
      <span class="tool">Evolution API</span>
      <span class="tool">n8n</span>
    </div>
  </div>
  <div class="bottom">
    <span class="watermark">@kalidcarvalho</span>
    <span class="swipe">arrasta →</span>
  </div>
</div>
</body>
</html>
