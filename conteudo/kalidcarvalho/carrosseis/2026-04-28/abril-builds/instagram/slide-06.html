<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; background: #0A0A0A; font-family: 'Space Grotesk', sans-serif; overflow: hidden; position: relative; }
.slide { position: absolute; inset: 0; padding: 80px; display: flex; flex-direction: column; justify-content: space-between; }
.top { display: flex; justify-content: space-between; align-items: center; }
.slide-num { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; }
.tag { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: #1A56DB; letter-spacing: 0.1em; text-transform: uppercase; }
.middle { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 40px 0; gap: 0; }
.accent-line { width: 40px; height: 3px; background: #D97757; border-radius: 2px; margin-bottom: 48px; }
.label { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; color: #D97757; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 28px; }
.stat { font-family: 'JetBrains Mono', monospace; font-size: 96px; font-weight: 700; color: #FFFFFF; line-height: 1; margin-bottom: 8px; }
.stat-label { font-size: 28px; font-weight: 400; color: rgba(255,255,255,0.35); margin-bottom: 48px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; }
.text-muted { font-size: 40px; font-weight: 400; color: rgba(255,255,255,0.45); line-height: 1.45; margin-bottom: 32px; }
.highlight { font-size: 44px; font-weight: 700; color: #FFFFFF; line-height: 1.35; }
.bottom { display: flex; align-items: center; justify-content: space-between; }
.watermark { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.18); }
.swipe { font-size: 15px; font-weight: 400; color: rgba(255,255,255,0.25); }
</style>
</head>
<body>
<div class="slide">
  <div class="top">
    <span class="slide-num">06 / 09</span>
    <span class="tag">Sistema 03</span>
  </div>
  <div class="middle">
    <div class="accent-line"></div>
    <div class="label">Agente de Atendimento</div>
    <div class="stat">51</div>
    <div class="stat-label">nodes no n8n</div>
    <div class="text-muted">Não é um bot com menu. Lê o histórico, entende o contexto, responde com a linguagem do negócio.</div>
    <div class="highlight">Construído inteiramente descrevendo o que precisava acontecer.</div>
  </div>
  <div class="bottom">
    <span class="watermark">@kalidcarvalho</span>
    <span class="swipe">arrasta →</span>
  </div>
</div>
</body>
</html>
