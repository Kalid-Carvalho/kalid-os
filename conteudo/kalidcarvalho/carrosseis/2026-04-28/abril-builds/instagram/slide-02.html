<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px;
  background: #0A0A0A;
  font-family: 'Space Grotesk', sans-serif;
  overflow: hidden; position: relative;
}

.slide {
  position: absolute; inset: 0;
  padding: 80px;
  display: flex; flex-direction: column;
  justify-content: space-between;
}

.top {
  display: flex; justify-content: space-between; align-items: center;
}

.slide-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px; font-weight: 600;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.1em;
}

.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 600;
  color: #1A56DB;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.middle {
  flex: 1;
  display: flex; flex-direction: column;
  justify-content: center;
  gap: 0;
  padding: 40px 0;
}

.accent-line {
  width: 40px; height: 3px;
  background: #1A56DB;
  border-radius: 2px;
  margin-bottom: 48px;
}

.text {
  font-size: 48px; font-weight: 500;
  color: rgba(255,255,255,0.55);
  line-height: 1.4;
  margin-bottom: 48px;
}

.highlight {
  font-size: 48px; font-weight: 700;
  color: #FFFFFF;
  line-height: 1.4;
  display: block;
}

.text-bottom {
  font-size: 44px; font-weight: 400;
  color: rgba(255,255,255,0.55);
  line-height: 1.4;
}

.bottom {
  display: flex; align-items: center; justify-content: space-between;
}

.watermark {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px; font-weight: 500;
  color: rgba(255,255,255,0.18);
}

.swipe {
  font-size: 15px; font-weight: 400;
  color: rgba(255,255,255,0.25);
}
</style>
</head>
<body>
<div class="slide">
  <div class="top">
    <span class="slide-num">02 / 09</span>
    <span class="tag">Build in Public</span>
  </div>

  <div class="middle">
    <div class="accent-line"></div>
    <div class="text">
      Por anos fiquei ocupado entregando pra outros que nunca testei o que conseguia construir.
    </div>
    <span class="highlight">A demissão em março forçou.</span>
    <br>
    <div class="text-bottom">
      Abril foi o primeiro mês construindo pra mim. Aqui estão os 3 sistemas que saíram do zero.
    </div>
  </div>

  <div class="bottom">
    <span class="watermark">@kalidcarvalho</span>
    <span class="swipe">arrasta →</span>
  </div>
</div>
</body>
</html>
