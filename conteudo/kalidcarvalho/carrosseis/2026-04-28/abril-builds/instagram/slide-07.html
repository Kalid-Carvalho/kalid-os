<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; background: #0A0A0A; font-family: 'Space Grotesk', sans-serif; overflow: hidden; position: relative; }
.slide { position: absolute; inset: 0; padding: 80px; display: flex; flex-direction: column; justify-content: space-between; }
.top { display: flex; justify-content: space-between; align-items: center; }
.slide-num { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; }
.tag { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; text-transform: uppercase; }
.middle { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 40px 0; gap: 0; }
.accent-line { width: 40px; height: 3px; background: #1A56DB; border-radius: 2px; margin-bottom: 48px; }
.intro { font-size: 36px; font-weight: 400; color: rgba(255,255,255,0.4); line-height: 1.4; margin-bottom: 40px; }
.before { display: flex; align-items: flex-start; gap: 24px; margin-bottom: 28px; padding: 32px; background: rgba(255,255,255,0.04); border-radius: 8px; }
.before-label { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; padding-top: 4px; }
.before-text { font-size: 34px; font-weight: 400; color: rgba(255,255,255,0.4); line-height: 1.4; text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.2); }
.after { display: flex; align-items: flex-start; gap: 24px; padding: 32px; background: rgba(26,86,219,0.08); border: 1px solid rgba(26,86,219,0.2); border-radius: 8px; }
.after-label { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: #1A56DB; text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; padding-top: 4px; }
.after-text { font-size: 34px; font-weight: 700; color: #FFFFFF; line-height: 1.4; }
.bottom { display: flex; align-items: center; justify-content: space-between; }
.watermark { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.18); }
.swipe { font-size: 15px; font-weight: 400; color: rgba(255,255,255,0.25); }
</style>
</head>
<body>
<div class="slide">
  <div class="top">
    <span class="slide-num">07 / 09</span>
    <span class="tag">O padrão</span>
  </div>
  <div class="middle">
    <div class="accent-line"></div>
    <div class="intro">O gargalo mudou em abril.</div>
    <div class="before">
      <span class="before-label">antes</span>
      <span class="before-text">saber implementar</span>
    </div>
    <div class="after">
      <span class="after-label">agora</span>
      <span class="after-text">saber descrever com precisão</span>
    </div>
  </div>
  <div class="bottom">
    <span class="watermark">@kalidcarvalho</span>
    <span class="swipe">arrasta →</span>
  </div>
</div>
</body>
</html>
