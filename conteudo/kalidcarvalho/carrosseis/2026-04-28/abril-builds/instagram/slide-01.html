<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; overflow: hidden; position: relative; font-family: 'Space Grotesk', sans-serif; }

.bg {
  position: absolute; inset: 0;
  background: url('../bg-capa.png') center center / cover no-repeat;
}

.overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(13,21,38,0.45) 0%,
    rgba(13,21,38,0.55) 40%,
    rgba(13,21,38,0.85) 70%,
    rgba(13,21,38,0.97) 100%
  );
}

.content {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  padding: 0 72px 80px;
}

.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px; font-weight: 600;
  color: #1A56DB;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 28px;
}

.title {
  font-size: 72px; font-weight: 700;
  color: #FFFFFF;
  line-height: 1.05;
  letter-spacing: -1.5px;
  margin-bottom: 32px;
}

.title span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 64px;
  color: #9BB3E8;
  font-weight: 600;
}

.divider {
  width: 48px; height: 3px;
  background: #1A56DB;
  border-radius: 2px;
  margin-bottom: 32px;
}

.subtitle {
  font-size: 28px; font-weight: 400;
  color: #9BB3E8;
  line-height: 1.45;
  margin-bottom: 56px;
}

.author {
  display: flex; align-items: center; gap: 16px;
}

.avatar {
  width: 56px; height: 56px;
  border-radius: 50%;
  border: 2px solid #1A56DB;
  overflow: hidden;
  flex-shrink: 0;
}

.avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }

.author-info { display: flex; flex-direction: column; gap: 2px; }
.author-name { font-size: 20px; font-weight: 600; color: #FFFFFF; }
.author-handle { font-size: 16px; font-weight: 400; color: #9BB3E8; }

.bottom-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 72px;
}
.progress { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 500; color: rgba(155,179,232,0.4); }
.swipe { font-size: 15px; font-weight: 500; color: rgba(155,179,232,0.4); }
</style>
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>
<div class="content">
  <div class="tag">Build in Public · Abril 2026</div>
  <div class="title">30 dias,<br><span>VS Code + Claude,</span><br>3 sistemas do zero.</div>
  <div class="divider"></div>
  <div class="subtitle">Aqui está o resultado.</div>
  <div class="author">
    <div class="avatar"><img src="../../../../../../marca/foto-perfil.png" alt="Kalid Carvalho"></div>
    <div class="author-info">
      <span class="author-name">Kalid Carvalho</span>
      <span class="author-handle">@kalidcarvalho</span>
    </div>
  </div>
</div>
<div class="bottom-bar">
  <span class="progress">1 / 9</span>
  <span class="swipe">arrasta →</span>
</div>
</body>
</html>
