<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; background: #0A0A0A; font-family: 'Space Grotesk', sans-serif; overflow: hidden; position: relative; }
.slide { position: absolute; inset: 0; padding: 80px; display: flex; flex-direction: column; justify-content: space-between; }
.top { display: flex; justify-content: space-between; align-items: center; }
.slide-num { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; }
.tag { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: #1A56DB; letter-spacing: 0.1em; text-transform: uppercase; }
.middle { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 40px 0; gap: 0; }
.accent-line { width: 40px; height: 3px; background: #1A56DB; border-radius: 2px; margin-bottom: 48px; }
.intro { font-size: 40px; font-weight: 400; color: rgba(255,255,255,0.4); line-height: 1.4; margin-bottom: 40px; }
.highlight { font-size: 52px; font-weight: 700; color: #FFFFFF; line-height: 1.25; margin-bottom: 48px; }
.next-items { display: flex; flex-direction: column; gap: 18px; }
.item { display: flex; align-items: center; gap: 20px; }
.dot { width: 8px; height: 8px; background: #1A56DB; border-radius: 50%; flex-shrink: 0; }
.item-text { font-size: 32px; font-weight: 400; color: rgba(255,255,255,0.55); line-height: 1.4; }
.bottom { display: flex; align-items: center; justify-content: space-between; }
.watermark { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.18); }
.swipe { font-size: 15px; font-weight: 400; color: rgba(255,255,255,0.25); }
</style>
</head>
<body>
<div class="slide">
  <div class="top">
    <span class="slide-num">08 / 09</span>
    <span class="tag">Maio</span>
  </div>
  <div class="middle">
    <div class="accent-line"></div>
    <div class="intro">Abril foi o primeiro mês. Maio vem com mais builds.</div>
    <div class="highlight">Próximo na fila:</div>
    <div class="next-items">
      <div class="item"><div class="dot"></div><span class="item-text">Agente de qualificação de leads com memória</span></div>
      <div class="item"><div class="dot"></div><span class="item-text">Integração com CRM</span></div>
      <div class="item"><div class="dot"></div><span class="item-text">Dashboard de acompanhamento</span></div>
    </div>
  </div>
  <div class="bottom">
    <span class="watermark">@kalidcarvalho</span>
    <span class="swipe">arrasta →</span>
  </div>
</div>
</body>
</html>
