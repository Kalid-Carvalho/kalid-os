<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; background: #0A0A0A; font-family: 'Space Grotesk', sans-serif; overflow: hidden; position: relative; }
.slide { position: absolute; inset: 0; padding: 80px; display: flex; flex-direction: column; justify-content: space-between; }
.top { display: flex; justify-content: space-between; align-items: center; }
.slide-num { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; }
.tag { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; text-transform: uppercase; }
.middle { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 40px 0; gap: 0; }
.accent-line { width: 40px; height: 3px; background: #D97757; border-radius: 2px; margin-bottom: 48px; }
.intro { font-size: 36px; font-weight: 400; color: rgba(255,255,255,0.4); line-height: 1.4; margin-bottom: 32px; }
.highlight { font-size: 58px; font-weight: 700; color: #FFFFFF; line-height: 1.2; margin-bottom: 40px; }
.highlight .num { font-family: 'JetBrains Mono', monospace; color: #D97757; }
.detail { font-size: 38px; font-weight: 400; color: rgba(255,255,255,0.45); line-height: 1.5; }
.callout { margin-top: 48px; border-left: 3px solid #D97757; padding-left: 28px; font-size: 36px; font-weight: 500; color: rgba(255,255,255,0.6); line-height: 1.45; font-style: italic; }
.bottom { display: flex; align-items: center; justify-content: space-between; }
.watermark { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.18); }
.swipe { font-size: 15px; font-weight: 400; color: rgba(255,255,255,0.25); }
</style>
</head>
<body>
<div class="slide">
  <div class="top">
    <span class="slide-num">04 / 09</span>
    <span class="tag">O detalhe</span>
  </div>
  <div class="middle">
    <div class="accent-line"></div>
    <div class="intro">O detalhe que quase quebrou tudo:</div>
    <div class="highlight">WhatsApp no Brasil aceita <span class="num">12</span> e <span class="num">13</span> dígitos.</div>
    <div class="detail">Mandar pro formato errado não entrega.</div>
    <div class="callout">Esse nó levou mais tempo que o resto do fluxo combinado.</div>
  </div>
  <div class="bottom">
    <span class="watermark">@kalidcarvalho</span>
    <span class="swipe">arrasta →</span>
  </div>
</div>
</body>
</html>
