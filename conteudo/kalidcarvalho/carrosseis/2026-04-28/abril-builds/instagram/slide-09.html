<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; background: #0A0A0A; font-family: 'Space Grotesk', sans-serif; overflow: hidden; position: relative; }
.slide { position: absolute; inset: 0; padding: 80px; display: flex; flex-direction: column; justify-content: space-between; }
.top { display: flex; justify-content: space-between; align-items: center; }
.slide-num { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; }
.middle { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 0; }
.cta-label { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; color: #1A56DB; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 40px; }
.cta-title { font-size: 68px; font-weight: 700; color: #FFFFFF; line-height: 1.1; margin-bottom: 32px; }
.cta-sub { font-size: 36px; font-weight: 400; color: rgba(255,255,255,0.45); line-height: 1.5; margin-bottom: 64px; }
.divider { width: 48px; height: 3px; background: #1A56DB; border-radius: 2px; margin-bottom: 48px; }
.handle { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700; color: #1A56DB; }
.bottom { display: flex; align-items: center; justify-content: space-between; }
.watermark { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.18); }
.end { font-size: 15px; font-weight: 400; color: rgba(255,255,255,0.25); }
</style>
</head>
<body>
<div class="slide">
  <div class="top">
    <span class="slide-num">09 / 09</span>
  </div>
  <div class="middle">
    <div class="cta-label">Build in Public</div>
    <div class="cta-title">Construindo<br>em público.</div>
    <div class="cta-sub">Todo o processo, sem filtro.<br>Incluindo o que quebra no caminho.</div>
    <div class="divider"></div>
    <div class="handle">@kalidcarvalho</div>
  </div>
  <div class="bottom">
    <span class="watermark">@kalidcarvalho</span>
    <span class="end">fim</span>
  </div>
</div>
</body>
</html>
