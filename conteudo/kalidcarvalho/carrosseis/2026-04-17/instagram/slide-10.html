<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; background: #0A1020; font-family: 'Space Grotesk', sans-serif; color: #FFFFFF; overflow: hidden; position: relative; }
.accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: #1A56DB; z-index: 5; }
.glow { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 900px; height: 900px; background: radial-gradient(circle, rgba(26,86,219,0.10) 0%, transparent 65%); z-index: 1; pointer-events: none; }

.top-header { position: absolute; top: 0; left: 0; right: 0; height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 72px; border-bottom: 1px solid rgba(26,86,219,0.18); z-index: 15; }
.top-header span { font-size: 16px; font-weight: 400; color: rgba(155,179,232,0.50); }
.top-header .brand { font-weight: 600; color: #9BB3E8; }

.content { position: absolute; top: 52px; left: 6px; right: 0; bottom: 96px; padding: 0 80px; display: flex; flex-direction: column; justify-content: center; z-index: 5; }

.logo-mark { width: 56px; height: 56px; background: #1A56DB; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 22px; color: #FFFFFF; margin-bottom: 48px; }
.main-line { font-size: 68px; font-weight: 700; line-height: 1.03; color: #F0F4FF; letter-spacing: -1.8px; margin-bottom: 16px; }
.main-line em { color: #4D7EFF; font-style: normal; }
.sub-line { font-size: 30px; font-weight: 400; color: #8899BB; line-height: 1.5; margin-bottom: 64px; max-width: 780px; }

.cta-row { display: flex; flex-direction: column; gap: 18px; }
.cta-item { display: flex; align-items: center; gap: 20px; padding: 28px 32px; border-radius: 8px; }
.cta-item.primary { background: #1A56DB; }
.cta-item.secondary { background: rgba(26,86,219,0.10); border: 1px solid rgba(26,86,219,0.30); }
.cta-icon { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.60); min-width: 28px; }
.cta-text { font-size: 26px; font-weight: 600; color: #F0F4FF; }
.cta-item.secondary .cta-text { color: #C8D8F0; }

.bottom-author { position: absolute; bottom: 0; left: 0; right: 0; height: 96px; display: flex; align-items: center; justify-content: space-between; padding: 0 72px; border-top: 1px solid rgba(26,86,219,0.18); z-index: 15; }
.ba-left { display: flex; align-items: center; gap: 14px; }
.ba-avatar { width: 62px; height: 62px; border-radius: 50%; border: 2px solid #1A56DB; overflow: hidden; background: #1C2D4A; flex-shrink: 0; }
.ba-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
.ba-info { display: flex; flex-direction: column; gap: 3px; }
.ba-name { font-size: 19px; font-weight: 700; color: #F0F4FF; display: flex; align-items: center; gap: 6px; }
.ba-check { color: #1A56DB; font-size: 17px; }
.ba-handle { font-size: 14px; font-weight: 400; color: #8899BB; }
.ba-right { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; color: rgba(155,179,232,0.40); }
</style>
</head>
<body>
<div class="accent-bar"></div>
<div class="glow"></div>
<div class="top-header">
  <span class="brand">@kalidcarvalho</span>
  <span>Case: Redesign de Site</span>
  <span>© 2026</span>
</div>
<div class="content">
  <div class="logo-mark">KC</div>
  <div class="main-line">Sites que acompanham<br>o <em>momento certo</em><br>do negócio.</div>
  <p class="sub-line">É isso que eu construo. Se quiser ver mais, me segue.</p>
  <div class="cta-row">
    <div class="cta-item primary">
      <span class="cta-icon">@</span>
      <span class="cta-text">Segue @kalidcarvalho para mais cases</span>
    </div>
    <div class="cta-item secondary">
      <span class="cta-icon">↗</span>
      <span class="cta-text">Quer conversar sobre o seu site? Link na bio.</span>
    </div>
  </div>
</div>
<div class="bottom-author">
  <div class="ba-left">
    <div class="ba-avatar"><img src="../../../../../marca/foto-perfil.png" alt="Kalid Carvalho"></div>
    <div class="ba-info">
      <span class="ba-name">Kalid Carvalho <span class="ba-check">✓</span></span>
      <span class="ba-handle">@kalidcarvalho</span>
    </div>
  </div>
  <span class="ba-right">10 / 10</span>
</div>
</body>
</html>
