<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 01 — Capa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    background: #0D1526;
    font-family: 'Space Grotesk', sans-serif;
    color: #FFFFFF;
    overflow: hidden;
    position: relative;
  }

  /* SPLIT SCREEN — full cover */
  .split-wrapper {
    position: absolute;
    inset: 0;
    display: flex;
  }

  .split-side {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .split-side img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  /* leve escurecimento no topo, forte no rodapé para o texto */
  .split-side .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(13, 21, 38, 0.04) 0%,
      rgba(13, 21, 38, 0.04) 45%,
      rgba(13, 21, 38, 0.72) 75%,
      rgba(13, 21, 38, 0.97) 100%
    );
  }

  /* label ANTES / DEPOIS */
  .site-label {
    position: absolute;
    top: 84px;
    left: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 4px;
    z-index: 2;
  }

  .split-side.antes .site-label {
    background: rgba(255,255,255,0.10);
    color: #C8D8F0;
    border: 1px solid rgba(200, 216, 240, 0.22);
  }

  .split-side.depois .site-label {
    background: rgba(26, 86, 219, 0.22);
    color: #5B8FFF;
    border: 1px solid rgba(26, 86, 219, 0.50);
  }

  /* divider */
  .divider {
    position: absolute;
    top: 0;
    left: calc(50% - 1px);
    width: 2px;
    height: 100%;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(26,86,219,0.70) 12%,
      rgba(26,86,219,0.70) 88%,
      transparent 100%
    );
    z-index: 5;
  }

  /* TOP BAR — flutuando */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 68px;
    padding: 0 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
    background: linear-gradient(to bottom, rgba(13,21,38,0.88) 0%, transparent 100%);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    background: #1A56DB;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: #FFFFFF;
  }

  .logo-name {
    font-size: 17px;
    font-weight: 500;
    color: #9BB3E8;
  }

  .slide-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: rgba(155,179,232,0.60);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* TEXT AREA — sobreposto no fundo */
  .text-area {
    position: absolute;
    bottom: 68px;
    left: 0; right: 0;
    padding: 0 72px 48px;
    z-index: 15;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: #1A56DB;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 18px;
  }

  .headline {
    font-size: 64px;
    font-weight: 700;
    line-height: 1.02;
    color: #FFFFFF;
    letter-spacing: -1.8px;
    margin-bottom: 16px;
    text-shadow: 0 2px 24px rgba(13,21,38,0.6);
  }

  .headline em {
    color: #4D7EFF;
    font-style: normal;
  }

  .subtitle {
    font-size: 23px;
    font-weight: 400;
    color: rgba(155,179,232,0.90);
    line-height: 1.5;
  }

  /* BOTTOM BAR — flutuando */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 68px;
    padding: 0 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
    background: linear-gradient(to top, rgba(13,21,38,0.88) 0%, transparent 100%);
  }

  .handle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: rgba(155,179,232,0.55);
  }

  .swipe-tag {
    font-size: 13px;
    font-weight: 500;
    color: #9BB3E8;
    background: rgba(17,29,53,0.85);
    border: 1px solid rgba(30,46,74,0.9);
    border-radius: 6px;
    padding: 8px 16px;
    backdrop-filter: blur(4px);
  }
</style>
</head>
<body>

  <div class="split-wrapper">
    <div class="split-side antes">
      <img src="../../../../../dados/antiga.png" alt="Site antigo">
      <div class="overlay"></div>
      <span class="site-label">antes</span>
    </div>
    <div class="split-side depois">
      <img src="../../../../../dados/nova.png" alt="Site novo">
      <div class="overlay"></div>
      <span class="site-label">depois</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="top-bar">
    <div class="logo">
      <div class="logo-mark">KC</div>
      <span class="logo-name">kalidcarvalho</span>
    </div>
    <span class="slide-label">Case · Redesign</span>
  </div>

  <div class="text-area">
    <div class="tag">antes &amp; depois</div>
    <h1 class="headline">Quando o negócio cresce,<br>o site precisa<br><em>crescer junto.</em></h1>
    <p class="subtitle">O que mudou e por que cada mudança importa.</p>
  </div>

  <div class="bottom-bar">
    <span class="handle">@kalidcarvalho</span>
    <span class="swipe-tag">arrasta →</span>
  </div>

</body>
</html>
