<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 01 — Capa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    background: #0D1526;
    font-family: 'Space Grotesk', sans-serif;
    color: #FFFFFF;
    overflow: hidden;
    position: relative;
  }

  /* SPLIT SCREEN — full cover */
  .split-wrapper {
    position: absolute;
    inset: 0;
    display: flex;
  }

  .split-side {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .split-side img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  /* overlay: quase nada no meio, forte no topo e rodapé */
  .split-side .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(13, 21, 38, 0.0) 10%,
      rgba(13, 21, 38, 0.0) 45%,
      rgba(13, 21, 38, 0.65) 70%,
      rgba(13, 21, 38, 0.98) 100%
    );
  }

  /* divider */
  .divider {
    position: absolute;
    top: 0; bottom: 0;
    left: calc(50% - 1px);
    width: 2px;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(26,86,219,0.65) 10%,
      rgba(26,86,219,0.65) 90%,
      transparent 100%
    );
    z-index: 6;
  }

  /* TOP BAR — sólido */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 64px;
    padding: 0 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
    background: rgba(8, 14, 28, 0.95);
    border-bottom: 1px solid rgba(26, 86, 219, 0.25);
  }

  .top-bar span {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: rgba(155, 179, 232, 0.65);
    letter-spacing: 0.02em;
  }

  .top-bar span.brand {
    font-weight: 600;
    color: #9BB3E8;
  }

  /* LABELS ANTES / DEPOIS — abaixo da top bar, bem destacados */
  .site-label {
    position: absolute;
    top: 76px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 4px;
    z-index: 15;
  }

  .label-antes {
    left: 20px;
    background: rgba(13, 21, 38, 0.82);
    color: #C8D8F0;
    border: 1px solid rgba(155, 179, 232, 0.30);
  }

  .label-depois {
    left: calc(50% + 20px);
    background: rgba(13, 21, 38, 0.82);
    color: #4D7EFF;
    border: 1px solid rgba(26, 86, 219, 0.55);
  }

  /* HEADLINE + subtítulo — centro/baixo */
  .text-area {
    position: absolute;
    bottom: 120px;
    left: 0; right: 0;
    padding: 0 68px 0;
    z-index: 15;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: #1A56DB;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 16px;
  }

  .headline {
    font-size: 62px;
    font-weight: 700;
    line-height: 1.03;
    color: #FFFFFF;
    letter-spacing: -1.6px;
    margin-bottom: 14px;
    text-shadow: 0 2px 20px rgba(8, 14, 28, 0.8);
  }

  .headline em {
    color: #4D7EFF;
    font-style: normal;
  }

  .subtitle {
    font-size: 22px;
    font-weight: 400;
    color: rgba(155, 179, 232, 0.85);
    line-height: 1.5;
  }

  /* BOTTOM AUTHOR */
  .bottom-author {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 108px;
    padding: 0 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
    background: rgba(8, 14, 28, 0.95);
    border-top: 1px solid rgba(26, 86, 219, 0.20);
  }

  .ba-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .ba-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid #1A56DB;
    overflow: hidden;
    flex-shrink: 0;
    background: #1C2D4A;
  }

  .ba-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
  }

  .ba-info {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .ba-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #F0F4FF;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .ba-check {
    color: #1A56DB;
    font-size: 18px;
  }

  .ba-handle {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 400;
    color: #8899BB;
  }

  .ba-right {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: rgba(155, 179, 232, 0.55);
  }
</style>
</head>
<body>

  <div class="split-wrapper">
    <div class="split-side antes">
      <img src="../../../../../dados/antiga.png" alt="Site antigo">
      <div class="overlay"></div>
    </div>
    <div class="split-side depois">
      <img src="../../../../../dados/nova.png" alt="Site novo">
      <div class="overlay"></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- TOP BAR -->
  <div class="top-bar">
    <span class="brand">@kalidcarvalho</span>
    <span>Case: Redesign de Site</span>
    <span>© 2026</span>
  </div>

  <!-- LABELS -->
  <span class="site-label label-antes">antes</span>
  <span class="site-label label-depois">depois</span>

  <!-- HEADLINE -->
  <div class="text-area">
    <div class="tag">antes &amp; depois</div>
    <h1 class="headline">Quando o negócio cresce,<br>o site precisa<br><em>crescer junto.</em></h1>
    <p class="subtitle">O que mudou e por que cada mudança importa.</p>
  </div>

  <!-- BOTTOM AUTHOR -->
  <div class="bottom-author">
    <div class="ba-left">
      <div class="ba-avatar">
        <img src="../../../../../marca/foto-perfil.png" alt="Kalid Carvalho">
      </div>
      <div class="ba-info">
        <span class="ba-name">Kalid Carvalho <span class="ba-check">✓</span></span>
        <span class="ba-handle">@kalidcarvalho</span>
      </div>
    </div>
    <span class="ba-right">Arrasta para o lado ▶</span>
  </div>

</body>
</html>
