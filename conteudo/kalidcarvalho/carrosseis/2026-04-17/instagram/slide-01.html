<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 01 — Capa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    background: #0D1526;
    font-family: 'Space Grotesk', sans-serif;
    color: #FFFFFF;
    overflow: hidden;
    position: relative;
  }

  /* TOP BAR */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 68px;
    padding: 0 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    background: rgba(13, 21, 38, 0.90);
    border-bottom: 1px solid rgba(30, 46, 74, 0.8);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    background: #1A56DB;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: #FFFFFF;
  }

  .logo-name {
    font-size: 17px;
    font-weight: 500;
    color: #9BB3E8;
  }

  .slide-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: #3D527A;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* SPLIT SCREEN */
  .split-wrapper {
    position: absolute;
    top: 68px;
    left: 0; right: 0;
    height: 740px;
    display: flex;
  }

  .split-side {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .split-side img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  .split-side .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(13, 21, 38, 0.25) 0%,
      rgba(13, 21, 38, 0.50) 65%,
      rgba(13, 21, 38, 0.95) 100%
    );
  }

  .site-label {
    position: absolute;
    top: 24px;
    left: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 4px;
    z-index: 2;
  }

  .split-side.antes .site-label {
    background: rgba(255,255,255,0.08);
    color: #9BB3E8;
    border: 1px solid rgba(155, 179, 232, 0.20);
  }

  .split-side.depois .site-label {
    background: rgba(26, 86, 219, 0.18);
    color: #4D7EFF;
    border: 1px solid rgba(26, 86, 219, 0.45);
  }

  /* divider line */
  .divider {
    position: absolute;
    top: 68px;
    left: calc(50% - 1px);
    width: 2px;
    height: 740px;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      #1A56DB 15%,
      #1A56DB 85%,
      transparent 100%
    );
    z-index: 5;
    opacity: 0.55;
  }

  /* TEXT AREA */
  .text-area {
    position: absolute;
    top: 808px;
    left: 0; right: 0;
    bottom: 68px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 72px;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: #1A56DB;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 20px;
  }

  .headline {
    font-size: 62px;
    font-weight: 700;
    line-height: 1.03;
    color: #FFFFFF;
    letter-spacing: -1.6px;
    margin-bottom: 18px;
  }

  .headline em {
    color: #1A56DB;
    font-style: normal;
  }

  .subtitle {
    font-size: 23px;
    font-weight: 400;
    color: #9BB3E8;
    line-height: 1.5;
  }

  /* BOTTOM BAR */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 68px;
    padding: 0 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid #1E2E4A;
    z-index: 10;
  }

  .handle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: #3D527A;
  }

  .swipe-tag {
    font-size: 13px;
    font-weight: 500;
    color: #9BB3E8;
    background: #111D35;
    border: 1px solid #1E2E4A;
    border-radius: 6px;
    padding: 8px 16px;
  }
</style>
</head>
<body>

  <div class="top-bar">
    <div class="logo">
      <div class="logo-mark">KC</div>
      <span class="logo-name">kalidcarvalho</span>
    </div>
    <span class="slide-label">Case · Redesign</span>
  </div>

  <div class="split-wrapper">
    <div class="split-side antes">
      <img src="../../../../../dados/antiga.png" alt="Site antigo">
      <div class="overlay"></div>
      <span class="site-label">antes</span>
    </div>
    <div class="split-side depois">
      <img src="../../../../../dados/nova.png" alt="Site novo">
      <div class="overlay"></div>
      <span class="site-label">depois</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="text-area">
    <div class="tag">antes &amp; depois</div>
    <h1 class="headline">Quando o negócio cresce,<br>o site precisa<br><em>crescer junto.</em></h1>
    <p class="subtitle">O que mudou — e por que cada mudança importa.</p>
  </div>

  <div class="bottom-bar">
    <span class="handle">@kalidcarvalho</span>
    <span class="swipe-tag">arrasta →</span>
  </div>

</body>
</html>
