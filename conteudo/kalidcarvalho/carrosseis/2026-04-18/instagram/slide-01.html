<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 01 — Capa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px;
  background: #0D1526;
  font-family: 'Space Grotesk', sans-serif;
  color: #FFFFFF;
  overflow: hidden; position: relative;
}

.accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: #1A56DB; z-index: 5; }
.glow { position: absolute; right: -100px; top: 50%; transform: translateY(-50%); width: 700px; height: 700px; background: radial-gradient(circle, rgba(26,86,219,0.12) 0%, transparent 65%); z-index: 1; pointer-events: none; }
.glow-left { position: absolute; left: -80px; bottom: 100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(26,86,219,0.06) 0%, transparent 65%); z-index: 1; pointer-events: none; }

/* TOP HEADER */
.top-header {
  position: absolute; top: 0; left: 0; right: 0; height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 72px;
  border-bottom: 1px solid rgba(26,86,219,0.18);
  z-index: 15;
}
.top-header span { font-size: 16px; font-weight: 400; color: rgba(155,179,232,0.50); }
.top-header .brand { font-weight: 600; color: #9BB3E8; }

/* CONTENT */
.content {
  position: absolute; top: 52px; left: 6px; right: 0; bottom: 96px;
  padding: 0 80px;
  display: flex; flex-direction: column; justify-content: center;
  z-index: 5;
}

.thread-tag {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(26,86,219,0.15);
  border: 1px solid rgba(26,86,219,0.35);
  border-radius: 100px;
  padding: 8px 18px;
  margin-bottom: 48px; width: fit-content;
}
.thread-tag .dot { width: 8px; height: 8px; border-radius: 50%; background: #1A56DB; }
.thread-tag span { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; color: #9BB3E8; letter-spacing: 0.12em; text-transform: uppercase; }

.headline {
  font-size: 76px; font-weight: 700;
  line-height: 1.0; letter-spacing: -2px;
  color: #F0F4FF; margin-bottom: 36px;
}
.headline em { color: #4D7EFF; font-style: normal; }

.divider { width: 52px; height: 3px; background: #1A56DB; border-radius: 2px; margin-bottom: 36px; }

.subtitle { font-size: 26px; font-weight: 400; color: #8899BB; line-height: 1.55; max-width: 760px; }
.subtitle strong { color: #C8D8F0; font-weight: 600; }

/* tweet count badge */
.tweet-count {
  position: absolute; bottom: 120px; right: 80px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.tweet-count .num { font-family: 'JetBrains Mono', monospace; font-size: 48px; font-weight: 700; color: rgba(26,86,219,0.25); line-height: 1; }
.tweet-count .label { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: rgba(155,179,232,0.25); letter-spacing: 0.12em; text-transform: uppercase; }

/* BOTTOM AUTHOR */
.bottom-author {
  position: absolute; bottom: 0; left: 0; right: 0; height: 96px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 72px;
  border-top: 1px solid rgba(26,86,219,0.18); z-index: 15;
}
.ba-left { display: flex; align-items: center; gap: 14px; }
.ba-avatar { width: 62px; height: 62px; border-radius: 50%; border: 2px solid #1A56DB; overflow: hidden; background: #1C2D4A; flex-shrink: 0; }
.ba-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
.ba-info { display: flex; flex-direction: column; gap: 3px; }
.ba-name { font-size: 19px; font-weight: 700; color: #F0F4FF; display: flex; align-items: center; gap: 6px; }
.ba-check { color: #1A56DB; font-size: 17px; }
.ba-handle { font-size: 14px; font-weight: 400; color: #8899BB; }
.ba-right { font-size: 15px; font-weight: 500; color: rgba(155,179,232,0.45); }
</style>
</head>
<body>
<div class="accent-bar"></div>
<div class="glow"></div>
<div class="glow-left"></div>

<div class="top-header">
  <span class="brand">@kalidcarvalho</span>
  <span>IA na prática</span>
  <span>© 2026</span>
</div>

<div class="content">
  <div class="thread-tag">
    <div class="dot"></div>
    <span>thread</span>
  </div>
  <h1 class="headline">Por que você<br>ainda não entende<br>o que a <em>IA faz.</em></h1>
  <div class="divider"></div>
  <p class="subtitle">Andrej Karpathy identificou a lacuna. <strong>Eu vivo ela todo dia.</strong></p>
</div>

<div class="tweet-count">
  <span class="num">7</span>
  <span class="label">tweets</span>
</div>

<div class="bottom-author">
  <div class="ba-left">
    <div class="ba-avatar"><img src="../../../../../marca/foto-perfil.png" alt="Kalid Carvalho"></div>
    <div class="ba-info">
      <span class="ba-name">Kalid Carvalho <span class="ba-check">✓</span></span>
      <span class="ba-handle">@kalidcarvalho</span>
    </div>
  </div>
  <span class="ba-right">arrasta →</span>
</div>
</body>
</html>
