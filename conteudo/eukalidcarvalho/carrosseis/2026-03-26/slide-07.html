<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 07 — CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: flex-start; }
  .canvas {
    width: 1080px;
    height: 1440px;
    background: #0A0A0A;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .tw-header {
    width: 100%;
    height: 120px;
    background: #0A0A0A;
    border-bottom: 1px solid #1E1E1E;
    display: flex;
    align-items: center;
    padding: 0 48px;
    gap: 20px;
    flex-shrink: 0;
  }
  .tw-avatar {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: #1A1A1A;
    border: 2px solid #333;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .tw-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .tw-name-row { display: flex; align-items: center; gap: 8px; }
  .tw-name { font-size: 22px; font-weight: 700; color: #FFFFFF; }
  .tw-check { font-size: 16px; color: #4A9EFF; font-weight: 700; }
  .tw-handle { font-size: 18px; color: #888888; }
  .tw-menu { font-size: 24px; color: #555555; letter-spacing: 2px; }

  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 80px;
    gap: 40px;
  }

  /* Yellow left-border accent on content box */
  .accent-box {
    border-left: 6px solid #F5C842;
    padding-left: 36px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .label {
    font-size: 16px;
    color: #F5C842;
    letter-spacing: 4px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .main-q {
    font-size: 52px;
    color: #FFFFFF;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
  }

  .sub-q {
    font-size: 32px;
    color: #888888;
    font-weight: 400;
    line-height: 1.4;
  }

  .divider-dark {
    width: 100%;
    height: 1px;
    background: #2A2A2A;
  }

  /* CTA — redesigned: solid yellow button */
  .cta-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .cta-instruction {
    font-size: 26px;
    color: #888888;
    font-weight: 400;
    text-align: center;
  }

  .cta-btn {
    background: #F5C842;
    color: #0A0A0A;
    font-size: 42px;
    font-weight: 900;
    padding: 28px 64px;
    border-radius: 6px;
    text-align: center;
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1;
  }

  .cta-where {
    font-size: 26px;
    color: #888888;
    font-weight: 400;
    text-align: center;
  }

  .handle-bottom {
    font-size: 24px;
    color: #FFFFFF;
    font-weight: 700;
    text-align: center;
  }

  .watermark {
    position: absolute;
    bottom: 40px;
    right: 48px;
    font-size: 22px;
    color: #555555;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="tw-header">
    <div class="tw-avatar"><img src="avatar.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" /></div>
    <div class="tw-info">
      <div class="tw-name-row">
        <span class="tw-name">Kalid Carvalho</span>
        <span class="tw-check">✓</span>
      </div>
      <div class="tw-handle">@eukalidcarvalho</div>
    </div>
    <div class="tw-menu">···</div>
  </div>

  <div class="main-content">
    <div class="accent-box">
      <div class="label">AGORA ME CONTA</div>
      <div class="main-q">
        Você já usa algum<br>
        agente de IA no seu<br>
        negócio?
      </div>
      <div class="sub-q">Ou ainda está no modo manual?</div>
    </div>

    <div class="divider-dark"></div>

    <div class="cta-area">
      <div class="cta-instruction">Se esse conteúdo fez sentido</div>
      <div class="cta-btn">ME SEGUE</div>
      <div class="cta-where">e comenta o que achou 👇</div>
    </div>

    <div class="handle-bottom">@eukalidcarvalho</div>
  </div>

  <div class="watermark">@eukalidcarvalho</div>
</div>
</body>
</html>
