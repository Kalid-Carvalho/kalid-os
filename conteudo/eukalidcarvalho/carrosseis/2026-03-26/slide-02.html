<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 02 — A Crença</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: flex-start; }
  .canvas {
    width: 1080px;
    height: 1440px;
    background: #0A0A0A;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .tw-header {
    width: 100%;
    height: 120px;
    background: #0A0A0A;
    border-bottom: 1px solid #1E1E1E;
    display: flex;
    align-items: center;
    padding: 0 48px;
    gap: 20px;
    flex-shrink: 0;
  }
  .tw-avatar {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: #1A1A1A;
    border: 2px solid #333;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .tw-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .tw-name-row { display: flex; align-items: center; gap: 8px; }
  .tw-name { font-size: 22px; font-weight: 700; color: #FFFFFF; }
  .tw-check { font-size: 16px; color: #4A9EFF; font-weight: 700; }
  .tw-handle { font-size: 18px; color: #888888; }
  .tw-menu { font-size: 24px; color: #555555; letter-spacing: 2px; }

  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 50px 80px 100px 80px;
    position: relative;
  }

  .slide-num {
    position: absolute;
    top: 20px;
    left: 60px;
    font-size: 90px;
    font-weight: 900;
    color: #1A1A1A;
    line-height: 1;
    user-select: none;
  }

  .label {
    font-size: 14px;
    color: #F5C842;
    letter-spacing: 3px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 36px;
    z-index: 1;
  }

  .main-statement {
    font-size: 44px;
    color: #FFFFFF;
    font-weight: 400;
    line-height: 1.25;
    margin-bottom: 4px;
    z-index: 1;
  }

  .divider-dark {
    width: 100%;
    height: 2px;
    background: #333333;
    margin: 40px 0;
  }

  .consequence-row {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 10px;
    font-size: 30px;
    line-height: 1.5;
    z-index: 1;
  }
  .c-grey { color: #888888; font-weight: 400; }
  .c-white { color: #FFFFFF; font-weight: 700; }
  .c-yellow { color: #F5C842; font-weight: 700; }

  .consequence-block {
    z-index: 1;
    font-size: 30px;
    line-height: 1.6;
  }

  .arrasta {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 20px;
    color: #555555;
    letter-spacing: 2px;
    font-weight: 500;
  }
  .watermark {
    position: absolute;
    bottom: 40px;
    right: 48px;
    font-size: 22px;
    color: #555555;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="tw-header">
    <div class="tw-avatar"><img src="avatar.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" /></div>
    <div class="tw-info">
      <div class="tw-name-row">
        <span class="tw-name">Kalid Carvalho</span>
        <span class="tw-check">✓</span>
      </div>
      <div class="tw-handle">@eukalidcarvalho</div>
    </div>
    <div class="tw-menu">···</div>
  </div>

  <div class="main-content">
    <div class="slide-num">02</div>

    <div class="label">A CRENÇA QUE ESTÁ TE CUSTANDO CLIENTES</div>

    <div class="main-statement">Todo mundo diz que</div>
    <div class="main-statement">"IA é para grandes</div>
    <div class="main-statement">empresas."</div>

    <div class="divider-dark"></div>

    <div class="consequence-block">
      <span class="c-grey">Essa crença está atrasando </span><span class="c-white">pequenos negócios</span><span class="c-grey"> em pelo menos </span><span class="c-yellow">12 meses.</span>
    </div>
  </div>

  <div class="arrasta">ARRASTA PARA O LADO ▶</div>
  <div class="watermark">@eukalidcarvalho</div>
</div>
</body>
</html>
