<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1350px;
      background: #F0F4FF;
      font-family: 'Inter', sans-serif; color: #0D1526;
      position: relative; overflow: hidden;
    }
    .accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: #1A56DB; z-index: 5; }

    /* Giant BG number */
    .bg-number {
      position: absolute; right: -40px; top: 50%;
      transform: translateY(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 600px; font-weight: 700;
      color: #1A56DB; opacity: 0.05;
      line-height: 1; z-index: 1;
      letter-spacing: -0.05em;
    }

    /* Content */
    .content {
      position: absolute; inset: 0;
      padding: 80px 80px 100px 86px;
      display: flex; flex-direction: column;
      justify-content: center; z-index: 10;
    }

    .tag {
      display: inline-flex;
      background: rgba(26,86,219,0.08);
      border: 1px solid rgba(26,86,219,0.25);
      border-radius: 4px; padding: 9px 18px;
      margin-bottom: 44px; width: fit-content;
    }
    .tag span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px; font-weight: 600;
      color: #1A56DB; letter-spacing: 0.14em; text-transform: uppercase;
    }

    .stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 21px; font-weight: 600;
      color: #9BB3E8; letter-spacing: 0.1em;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .big-stat {
      font-family: 'JetBrains Mono', monospace;
      font-size: 220px; font-weight: 700;
      color: #1A56DB; line-height: 0.9;
      letter-spacing: -0.04em; margin-bottom: 44px;
    }

    .headline {
      font-size: 58px; font-weight: 800;
      line-height: 1.05; color: #0D1526;
      letter-spacing: -0.02em; margin-bottom: 32px;
    }

    .divider { width: 56px; height: 3px; background: #1A56DB; margin-bottom: 30px; border-radius: 2px; }

    .body-text {
      font-size: 30px; font-weight: 400;
      color: #3D527A; line-height: 1.55; max-width: 880px;
    }
    .body-text strong { color: #0D1526; font-weight: 700; }

    .bottom-row {
      position: absolute; bottom: 64px; left: 86px; right: 80px;
      display: flex; align-items: center; justify-content: space-between; z-index: 10;
    }
    .handle { font-family: 'JetBrains Mono', monospace; font-size: 21px; color: #9BB3E8; }
    .progress { display: flex; align-items: center; gap: 10px; }
    .progress-track { width: 150px; height: 2px; background: rgba(26,86,219,0.15); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; width: 66.66%; background: #1A56DB; border-radius: 2px; }
    .progress-label { font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #9BB3E8; }
  </style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="bg-number">40%</div>

  <div class="content">
    <div class="tag"><span>prova 02</span></div>
    <div class="stat-label">concentração de receita</div>
    <div class="big-stat">40%</div>
    <div class="headline">Um cliente que<br>paga as contas<br>é risco, não parceria.</div>
    <div class="divider"></div>
    <div class="body-text">
      Quando ele sai, seja por corte de budget, troca de gestor ou proposta mais barata do concorrente, a empresa não tem pipeline.<br><br>
      Tem <strong>desespero.</strong> E desespero fecha contrato ruim.
    </div>
  </div>

  <div class="bottom-row">
    <div class="handle">@eukalidcarvalho</div>
    <div class="progress">
      <div class="progress-track"><div class="progress-fill"></div></div>
      <span class="progress-label">06/09</span>
    </div>
  </div>
</body>
</html>
