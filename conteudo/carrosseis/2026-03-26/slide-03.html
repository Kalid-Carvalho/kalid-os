<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 03 — Agente vs Ferramenta</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: flex-start; }
  .canvas {
    width: 1080px;
    height: 1440px;
    background: #111111;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .tw-header {
    width: 100%;
    height: 120px;
    background: #111111;
    border-bottom: 1px solid #1E1E1E;
    display: flex;
    align-items: center;
    padding: 0 48px;
    gap: 20px;
    flex-shrink: 0;
  }
  .tw-avatar {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: #1A1A1A;
    border: 2px solid #333;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .tw-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .tw-name-row { display: flex; align-items: center; gap: 8px; }
  .tw-name { font-size: 22px; font-weight: 700; color: #FFFFFF; }
  .tw-check { font-size: 16px; color: #4A9EFF; font-weight: 700; }
  .tw-handle { font-size: 18px; color: #888888; }
  .tw-menu { font-size: 24px; color: #555555; letter-spacing: 2px; }

  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 60px 100px 60px;
    gap: 40px;
  }

  .label {
    font-size: 14px;
    color: #F5C842;
    letter-spacing: 3px;
    font-weight: 700;
    text-transform: uppercase;
    text-align: center;
  }

  .comparison-row {
    display: flex;
    width: 100%;
    gap: 0;
    align-items: stretch;
    min-height: 520px;
  }

  .col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 36px 32px;
  }

  .col-left { align-items: flex-start; }
  .col-right { align-items: flex-start; }

  .col-divider {
    width: 1px;
    background: #333333;
    flex-shrink: 0;
  }

  .col-header-grey {
    font-size: 18px;
    color: #888888;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .col-header-yellow {
    font-size: 18px;
    color: #F5C842;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .col-icon {
    font-size: 40px;
    line-height: 1;
    margin: 4px 0;
  }

  .col-text-white {
    font-size: 28px;
    color: #FFFFFF;
    font-weight: 400;
    line-height: 1.35;
  }
  .col-text-italic {
    font-size: 28px;
    color: #FFFFFF;
    font-weight: 500;
    font-style: italic;
    line-height: 1.35;
  }

  .col-result-grey {
    font-size: 22px;
    color: #888888;
    font-weight: 400;
    line-height: 1.4;
    margin-top: auto;
    padding-top: 20px;
    border-top: 1px solid #222;
  }
  .col-result-yellow {
    font-size: 22px;
    color: #F5C842;
    font-weight: 600;
    line-height: 1.4;
    margin-top: auto;
    padding-top: 20px;
    border-top: 1px solid #222;
  }

  .bottom-note {
    font-size: 26px;
    color: #FFFFFF;
    font-style: italic;
    text-align: center;
    line-height: 1.4;
    padding: 0 20px;
  }

  .arrasta {
    position: absolute;
    bottom: 40px;
    left: 0; right: 0;
    text-align: center;
    font-size: 20px;
    color: #555555;
    letter-spacing: 2px;
    font-weight: 500;
  }
  .watermark {
    position: absolute;
    bottom: 40px;
    right: 48px;
    font-size: 22px;
    color: #555555;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="tw-header">
    <div class="tw-avatar"><img src="avatar.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" /></div>
    <div class="tw-info">
      <div class="tw-name-row">
        <span class="tw-name">Kalid Carvalho</span>
        <span class="tw-check">✓</span>
      </div>
      <div class="tw-handle">@eukalidcarvalho</div>
    </div>
    <div class="tw-menu">···</div>
  </div>

  <div class="main-content">
    <div class="label">ENTENDA A DIFERENÇA</div>

    <div class="comparison-row">
      <!-- Left col: Ferramenta -->
      <div class="col col-left">
        <div class="col-header-grey">FERRAMENTA</div>
        <div class="col-icon">⚡</div>
        <div class="col-text-white">Você pergunta,<br>ela responde.</div>
        <div class="col-result-grey">Poupa tempo pontualmente</div>
      </div>

      <div class="col-divider"></div>

      <!-- Right col: Agente -->
      <div class="col col-right">
        <div class="col-header-yellow">AGENTE DE IA</div>
        <div class="col-icon">⚙</div>
        <div class="col-text-white">Você define a missão</div>
        <div class="col-text-italic">— ele executa.</div>
        <div class="col-result-yellow">Trabalha enquanto você dorme</div>
      </div>
    </div>

    <div class="bottom-note">"A diferença não é técnica. É operacional."</div>
  </div>

  <div class="arrasta">ARRASTA PARA O LADO ▶</div>
  <div class="watermark">@eukalidcarvalho</div>
</div>
</body>
</html>
