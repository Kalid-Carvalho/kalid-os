<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 05 — Por Que o Pequeno Ganha</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: flex-start; }
  .canvas {
    width: 1080px;
    height: 1440px;
    background: #111111;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .tw-header {
    width: 100%;
    height: 120px;
    background: #111111;
    border-bottom: 1px solid #1E1E1E;
    display: flex;
    align-items: center;
    padding: 0 48px;
    gap: 20px;
    flex-shrink: 0;
  }
  .tw-avatar {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: #1A1A1A;
    border: 2px solid #333;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .tw-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .tw-name-row { display: flex; align-items: center; gap: 8px; }
  .tw-name { font-size: 22px; font-weight: 700; color: #FFFFFF; }
  .tw-check { font-size: 16px; color: #4A9EFF; font-weight: 700; }
  .tw-handle { font-size: 18px; color: #888888; }
  .tw-menu { font-size: 24px; color: #555555; letter-spacing: 2px; }

  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 80px 100px 80px;
    gap: 28px;
  }

  .label {
    font-size: 16px;
    color: #F5C842;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .big-statement {
    font-size: 44px;
    font-weight: 800;
    color: #FFFFFF;
    line-height: 1.15;
  }
  .big-statement-grey {
    font-size: 44px;
    font-weight: 400;
    color: #888888;
    line-height: 1.15;
  }

  .numbered-list {
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding: 10px 0;
  }
  .num-item {
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .num-circle {
    font-size: 30px;
    color: #F5C842;
    font-weight: 700;
    flex-shrink: 0;
    line-height: 1;
  }
  .num-text {
    font-size: 30px;
    color: #888888;
    font-weight: 400;
    line-height: 1.3;
  }

  .divider-dark {
    width: 100%;
    height: 2px;
    background: #2A2A2A;
  }

  .contrast-block {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .contrast-white {
    font-size: 38px;
    color: #FFFFFF;
    font-weight: 800;
    line-height: 1.2;
  }
  .contrast-yellow {
    font-size: 38px;
    color: #F5C842;
    font-weight: 800;
    line-height: 1.2;
  }

  .arrasta {
    position: absolute;
    bottom: 40px;
    left: 0; right: 0;
    text-align: center;
    font-size: 20px;
    color: #555555;
    letter-spacing: 2px;
    font-weight: 500;
  }
  .watermark {
    position: absolute;
    bottom: 40px;
    right: 48px;
    font-size: 22px;
    color: #555555;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="tw-header">
    <div class="tw-avatar"><img src="avatar.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" /></div>
    <div class="tw-info">
      <div class="tw-name-row">
        <span class="tw-name">Kalid Carvalho</span>
        <span class="tw-check">✓</span>
      </div>
      <div class="tw-handle">@eukalidcarvalho</div>
    </div>
    <div class="tw-menu">···</div>
  </div>

  <div class="main-content">
    <div class="label">① AGILIDADE É VANTAGEM COMPETITIVA</div>

    <div>
      <div class="big-statement">Empresas grandes demoram</div>
      <div class="big-statement-grey">meses para implementar.</div>
    </div>

    <div class="numbered-list">
      <div class="num-item">
        <span class="num-circle">①</span>
        <span class="num-text">Burocracia</span>
      </div>
      <div class="num-item">
        <span class="num-circle">②</span>
        <span class="num-text">Aprovações</span>
      </div>
      <div class="num-item">
        <span class="num-circle">③</span>
        <span class="num-text">Integração com sistemas legados</span>
      </div>
    </div>

    <div class="divider-dark"></div>

    <div class="contrast-block">
      <div class="contrast-white">Você decide hoje.</div>
      <div class="contrast-yellow">Executa amanhã.</div>
    </div>
  </div>

  <div class="arrasta">ARRASTA PARA O LADO ▶</div>
  <div class="watermark">@eukalidcarvalho</div>
</div>
</body>
</html>
