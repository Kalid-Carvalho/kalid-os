<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 04 — O Dado</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: flex-start; }
  .canvas {
    width: 1080px;
    height: 1440px;
    background: #0A0A0A;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .tw-header {
    width: 100%;
    height: 120px;
    background: #0A0A0A;
    border-bottom: 1px solid #1E1E1E;
    display: flex;
    align-items: center;
    padding: 0 48px;
    gap: 20px;
    flex-shrink: 0;
  }
  .tw-avatar {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: #1A1A1A;
    border: 2px solid #333;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .tw-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .tw-name-row { display: flex; align-items: center; gap: 8px; }
  .tw-name { font-size: 22px; font-weight: 700; color: #FFFFFF; }
  .tw-check { font-size: 16px; color: #4A9EFF; font-weight: 700; }
  .tw-handle { font-size: 18px; color: #888888; }
  .tw-menu { font-size: 24px; color: #555555; letter-spacing: 2px; }

  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 80px 100px 80px;
    gap: 32px;
    text-align: center;
  }

  .label {
    font-size: 14px;
    color: #F5C842;
    letter-spacing: 3px;
    font-weight: 700;
    text-transform: uppercase;
  }

  /* DATA HERO: 5% → 40% */
  .data-hero {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 8px 0;
  }
  .num-old {
    font-size: 120px;
    font-weight: 900;
    color: #888888;
    line-height: 1;
    letter-spacing: -4px;
  }
  .arrow-yellow {
    font-size: 60px;
    color: #F5C842;
    font-weight: 700;
    line-height: 1;
  }
  .num-new {
    font-size: 150px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1;
    letter-spacing: -6px;
  }

  .data-context {
    font-size: 28px;
    color: #888888;
    font-weight: 400;
    line-height: 1.4;
  }

  /* Secondary stat card */
  .stat-card {
    border: 1px solid #333333;
    border-radius: 8px;
    padding: 28px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .stat-big {
    font-size: 72px;
    color: #F5C842;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -2px;
  }
  .stat-label {
    font-size: 24px;
    color: #888888;
    font-weight: 400;
  }
  .stat-source {
    font-size: 20px;
    color: #555555;
    font-weight: 400;
    font-style: italic;
  }

  .bottom-note {
    font-size: 28px;
    color: #FFFFFF;
    font-weight: 400;
    line-height: 1.4;
  }
  .bottom-note-yellow {
    font-size: 28px;
    color: #F5C842;
    font-weight: 700;
    line-height: 1.4;
  }

  .arrasta {
    position: absolute;
    bottom: 40px;
    left: 0; right: 0;
    text-align: center;
    font-size: 20px;
    color: #555555;
    letter-spacing: 2px;
    font-weight: 500;
  }
  .watermark {
    position: absolute;
    bottom: 40px;
    right: 48px;
    font-size: 22px;
    color: #555555;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="tw-header">
    <div class="tw-avatar"><img src="avatar.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" /></div>
    <div class="tw-info">
      <div class="tw-name-row">
        <span class="tw-name">Kalid Carvalho</span>
        <span class="tw-check">✓</span>
      </div>
      <div class="tw-handle">@eukalidcarvalho</div>
    </div>
    <div class="tw-menu">···</div>
  </div>

  <div class="main-content">
    <div class="label">O DADO QUE NINGUÉM ESTÁ CONTANDO</div>

    <div class="data-hero">
      <div class="num-old">5%</div>
      <div class="arrow-yellow">→</div>
      <div class="num-new">40%</div>
    </div>

    <div class="data-context">
      das empresas usando IA<br>
      em apenas 12 meses
    </div>

    <div class="stat-card">
      <div class="stat-big">8×</div>
      <div class="stat-label">de crescimento</div>
      <div class="stat-source">60%+ eficiência operacional (Gartner)</div>
    </div>

    <div class="bottom-note">A janela de vantagem existe.</div>
    <div class="bottom-note-yellow">Mas não vai durar.</div>
  </div>

  <div class="arrasta">ARRASTA PARA O LADO ▶</div>
  <div class="watermark">@eukalidcarvalho</div>
</div>
</body>
</html>
