<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; overflow: hidden; background: #0D1526; font-family: 'Space Grotesk', sans-serif; position: relative; }
.slide { position: absolute; inset: 0; display: flex; flex-direction: column; padding: 72px 80px; }
.header { display: flex; align-items: center; gap: 12px; padding-bottom: 52px; border-bottom: 1px solid #1E2E4A; flex-shrink: 0; }
.avatar { width: 56px; height: 56px; border-radius: 50%; border: 2px solid #2563EB; background: #1A56DB; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -1px; flex-shrink: 0; }
.avatar span { font-weight: 300; opacity: 0.8; font-size: 13px; }
.name { font-size: 20px; font-weight: 700; color: #fff; }
.check { color: #4A90E2; font-size: 15px; }
.handle { font-size: 16px; color: #9BB3E8; }
.body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 28px; }
.watermark { position: absolute; bottom: 36px; right: 52px; font-size: 20px; font-weight: 500; color: #3A4D6E; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <div class="avatar">K<span>C</span></div>
    <div>
      <div class="name">Kalid Carvalho <span class="check">✓</span></div>
      <div class="handle">@eukalidcarvalho</div>
    </div>
  </div>
  <div class="body">
    <div style="font-size:34px;font-weight:600;color:#FFFFFF;letter-spacing:-0.3px;margin-bottom:8px;">A estrutura tem 5 partes:</div>
    <div style="display:flex;align-items:center;gap:28px;padding:20px 0;border-bottom:1px solid #1E2E4A;">
      <div style="font-size:17px;font-weight:700;color:#1A56DB;letter-spacing:0.05em;min-width:32px;">01</div>
      <div><div style="font-size:29px;font-weight:700;color:#FFFFFF;">Modelo</div><div style="font-size:20px;font-weight:400;color:#9BB3E8;margin-top:2px;">pensa e decide</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:28px;padding:20px 0;border-bottom:1px solid #1E2E4A;">
      <div style="font-size:17px;font-weight:700;color:#1A56DB;letter-spacing:0.05em;min-width:32px;">02</div>
      <div><div style="font-size:29px;font-weight:700;color:#FFFFFF;">Tools</div><div style="font-size:20px;font-weight:400;color:#9BB3E8;margin-top:2px;">agem no mundo real</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:28px;padding:20px 0;border-bottom:1px solid #1E2E4A;">
      <div style="font-size:17px;font-weight:700;color:#1A56DB;letter-spacing:0.05em;min-width:32px;">03</div>
      <div><div style="font-size:29px;font-weight:700;color:#FFFFFF;">Memória</div><div style="font-size:20px;font-weight:400;color:#9BB3E8;margin-top:2px;">guarda o histórico e o contexto</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:28px;padding:20px 0;border-bottom:1px solid #1E2E4A;">
      <div style="font-size:17px;font-weight:700;color:#1A56DB;letter-spacing:0.05em;min-width:32px;">04</div>
      <div><div style="font-size:29px;font-weight:700;color:#FFFFFF;">Permissões</div><div style="font-size:20px;font-weight:400;color:#9BB3E8;margin-top:2px;">controlam o que o agente pode fazer</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:28px;padding:20px 0;">
      <div style="font-size:17px;font-weight:700;color:#1A56DB;letter-spacing:0.05em;min-width:32px;">05</div>
      <div><div style="font-size:29px;font-weight:700;color:#FFFFFF;">Loop</div><div style="font-size:20px;font-weight:400;color:#9BB3E8;margin-top:2px;">repete até o problema estar resolvido</div></div>
    </div>
  </div>
</div>
<div class="watermark">@eukalidcarvalho</div>
</body>
</html>
