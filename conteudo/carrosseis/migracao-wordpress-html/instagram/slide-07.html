<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1350px;
      background: #0D1526;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      height: 72px;
      display: flex; align-items: center;
      padding: 0 60px;
      border-bottom: 1px solid #1E2E4A;
      flex-shrink: 0;
    }

    .top-bar span {
      font-size: 16px; font-weight: 600;
      color: #3A4D6E; letter-spacing: 2.5px; text-transform: uppercase;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 44px 60px 32px;
    }

    .label {
      font-size: 16px; font-weight: 600;
      color: #1A56DB; letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 16px;
    }

    .heading {
      font-size: 52px; font-weight: 700;
      color: #FFFFFF; line-height: 1.08; letter-spacing: -1.5px;
      margin-bottom: 8px;
    }

    .sub {
      font-size: 26px; font-weight: 400;
      color: #9BB3E8; line-height: 1.5;
      margin-bottom: 36px;
    }

    /* Browser mockup */
    .browser-wrap {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .browser {
      width: 100%;
      flex: 1;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
    }

    .browser-bar {
      height: 48px;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 14px;
      flex-shrink: 0;
    }

    .browser-dots { display: flex; gap: 7px; }
    .dot { width: 13px; height: 13px; border-radius: 50%; }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: #28c840; }

    .browser-url {
      flex: 1; height: 28px;
      background: #2a2a2a;
      border-radius: 5px;
      display: flex; align-items: center;
      padding: 0 12px;
      font-size: 15px; color: #ccc;
    }

    .url-lock { color: #4CAF50; margin-right: 7px; font-size: 13px; }

    /* Video area */
    .video-area {
      flex: 1;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    .site-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    /* Fallback quando não há vídeo */
    .video-placeholder {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #0a0a0a;
    }

    .placeholder-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(26,86,219,0.15);
      border: 1.5px solid rgba(26,86,219,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }

    .placeholder-text {
      font-size: 20px; font-weight: 500;
      color: #3A4D6E; text-align: center; line-height: 1.5;
    }

    /* Scroll bar decorativo */
    .scroll-bar {
      position: absolute;
      right: 4px; top: 0; bottom: 0;
      width: 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 4px;
    }

    .scroll-thumb {
      position: absolute;
      top: 0; width: 100%; height: 20%;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
    }

    /* Badge live */
    .live-badge {
      position: absolute;
      top: 16px; left: 16px;
      background: #EF4444;
      color: white;
      font-size: 14px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 6px 14px; border-radius: 4px;
      display: flex; align-items: center; gap: 8px;
    }

    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: white;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* URL badge abaixo do browser */
    .url-badge {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .url-pill {
      background: rgba(26,86,219,0.1);
      border: 1px solid rgba(26,86,219,0.3);
      color: #9BB3E8;
      font-size: 20px; font-weight: 500;
      padding: 10px 22px; border-radius: 6px;
    }

    .url-accent { color: #1A56DB; font-weight: 700; }

    .bottom-bar {
      height: 100px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 60px;
      border-top: 1px solid #1E2E4A;
      flex-shrink: 0;
    }

    .author { display: flex; align-items: center; gap: 14px; }

    .avatar {
      width: 48px; height: 48px;
      border-radius: 50%; border: 2px solid #2563EB;
      background: #1A56DB;
      overflow: hidden; flex-shrink: 0;
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .author-name { font-size: 20px; font-weight: 700; color: #FFFFFF; line-height: 1.2; }
    .author-handle { font-size: 16px; color: #9BB3E8; }
    .next { font-size: 18px; font-weight: 600; color: #3A4D6E; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="top-bar">
    <span>@kalidcarvalho · IA e Tech · © 2026</span>
  </div>

  <div class="content">
    <div class="label">Resultado final</div>
    <div class="heading">Site no ar.</div>
    <div class="sub">grovw.com.br — construído com Claude Code.</div>

    <div class="browser-wrap">
      <div class="browser">
        <div class="browser-bar">
          <div class="browser-dots">
            <div class="dot dot-r"></div>
            <div class="dot dot-y"></div>
            <div class="dot dot-g"></div>
          </div>
          <div class="browser-url">
            <span class="url-lock">🔒</span>
            grovw.com.br
          </div>
        </div>

        <div class="video-area">
          <video class="site-video" autoplay muted loop playsinline>
            <source src="../site-video.mp4" type="video/mp4">
          </video>
          <!-- fallback se não houver vídeo -->
          <script>
            var v = document.querySelector('.site-video');
            v.addEventListener('error', function() {
              v.style.display = 'none';
              document.querySelector('.video-placeholder').style.display = 'flex';
            });
          </script>
          <div class="video-placeholder" style="display:none;">
            <div class="placeholder-icon">▶</div>
            <div class="placeholder-text">Coloque site-video.mp4<br>na pasta do carrossel</div>
          </div>
          <div class="live-badge">
            <div class="live-dot"></div>
            AO VIVO
          </div>
          <div class="scroll-bar"><div class="scroll-thumb"></div></div>
        </div>
      </div>

      <div class="url-badge">
        <div class="url-pill"><span class="url-accent">grovw</span>.com.br</div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="author">
      <div class="avatar">
        <img src="../avatar.png" alt="Kalid">
      </div>
      <div>
        <div class="author-name">Kalid Carvalho</div>
        <div class="author-handle">@kalidcarvalho</div>
      </div>
    </div>
    <div class="next">Arrasta ▶</div>
  </div>
</body>
</html>
