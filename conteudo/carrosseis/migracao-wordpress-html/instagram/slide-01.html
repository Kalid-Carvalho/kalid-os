<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1350px;
      background: #0D1526;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(26, 86, 219, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26, 86, 219, 0.06) 1px, transparent 1px);
      background-size: 54px 54px;
    }

    .bg-fade {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #0D1526 0%, transparent 30%, transparent 55%, #0D1526 85%);
    }

    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 72px;
      display: flex;
      align-items: center;
      padding: 0 60px;
      border-bottom: 1px solid #1E2E4A;
      z-index: 10;
    }

    .top-bar span {
      font-size: 16px;
      font-weight: 600;
      color: #3A4D6E;
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    .center-visual {
      position: absolute;
      top: 86px;
      left: 60px; right: 60px;
      height: 640px;
      z-index: 5;
    }

    /* Browser mockup */
    .browser {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
    }

    .browser-bar {
      height: 52px;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      flex-shrink: 0;
    }

    .browser-dots {
      display: flex; gap: 8px;
    }

    .dot { width: 14px; height: 14px; border-radius: 50%; }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: #28c840; }

    .browser-url {
      flex: 1;
      height: 30px;
      background: #2a2a2a;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      font-family: 'Space Grotesk', monospace;
      font-size: 16px;
      color: #888;
    }

    .url-lock { color: #4CAF50; margin-right: 8px; font-size: 14px; }
    .url-text { color: #ccc; }

    /* GROVW site preview inside browser */
    .site-content {
      flex: 1;
      background: #000000;
      overflow: hidden;
      position: relative;
    }

    .site-screenshot {
      width: 100%;
      display: block;
      object-fit: cover;
      object-position: top center;
    }

    /* Scroll fade */
    .site-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(transparent, #000000);
    }

    /* Scroll bar */
    .scroll-bar {
      position: absolute;
      right: 4px;
      top: 0; bottom: 0;
      width: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
    }

    .scroll-thumb {
      position: absolute;
      top: 0;
      width: 100%;
      height: 25%;
      background: rgba(255,255,255,0.25);
      border-radius: 4px;
    }

    /* GROVW badge */
    .grovw-badge {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      background: #cdff00;
      color: #000;
      font-size: 18px;
      font-weight: 700;
      padding: 8px 24px;
      border-radius: 4px;
      letter-spacing: 2px;
      white-space: nowrap;
      z-index: 20;
    }

    .bottom-content {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 60px 64px;
      z-index: 10;
    }

    .divider {
      height: 1px;
      background: #1E2E4A;
      margin-bottom: 40px;
    }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 2px solid #2563EB;
      background: #1A56DB;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: white;
      flex-shrink: 0;
    }

    .profile-name {
      font-size: 22px; font-weight: 700; color: #FFFFFF; line-height: 1.2;
    }

    .profile-handle {
      font-size: 18px; font-weight: 400; color: #9BB3E8;
    }

    .tag {
      display: inline-block;
      background: rgba(26,86,219,0.15);
      border: 1px solid rgba(26,86,219,0.35);
      color: #9BB3E8;
      font-size: 16px; font-weight: 600;
      letter-spacing: 2.5px; text-transform: uppercase;
      padding: 8px 18px; border-radius: 4px;
      margin-bottom: 24px;
    }

    .title {
      font-size: 74px; font-weight: 700;
      color: #FFFFFF;
      line-height: 1.06; letter-spacing: -2px;
      margin-bottom: 32px;
    }

    .title .accent { color: #1A56DB; }
    .title .claude { color: #CC785C; }

    .swipe {
      font-size: 18px; font-weight: 500;
      color: #3A4D6E; letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-fade"></div>

  <div class="top-bar">
    <span>@kalidcarvalho · IA e Tech · © 2026</span>
  </div>

  <div class="center-visual">
    <div class="browser">
      <div class="browser-bar">
        <div class="browser-dots">
          <div class="dot dot-r"></div>
          <div class="dot dot-y"></div>
          <div class="dot dot-g"></div>
        </div>
        <div class="browser-url">
          <span class="url-lock">🔒</span>
          <span class="url-text">grovw.com.br</span>
        </div>
      </div>
      <div class="site-content">
        <img class="site-screenshot" src="../grovw-site.png" alt="GROVW site">
        <div class="site-fade"></div>
        <div class="scroll-bar"><div class="scroll-thumb"></div></div>
      </div>
    </div>
    <div class="grovw-badge">GROVW — Site próprio</div>
  </div>

  <div class="bottom-content">
    <div class="divider"></div>
    <div class="profile-row">
      <div class="avatar"><img src="../avatar.png" alt="Kalid" style="width:100%;height:100%;object-fit:cover;object-position:top center;border-radius:50%;"></div>
      <div>
        <div class="profile-name">Kalid Carvalho</div>
        <div class="profile-handle">@kalidcarvalho</div>
      </div>
    </div>
    <div class="tag">Building</div>
    <div class="title">Meu site saiu<br>do <span class="accent">WordPress</span>.<br><span class="claude">Claude Code</span><br>entrou.</div>
    <div class="swipe">Deslize para ver como foi ▶</div>
  </div>
</body>
</html>
