<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 02</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1350px;
    background: #0D1526;
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden; position: relative;
  }
  /* Safe zone: conteúdo crítico entre y=160 e y=1190 */
  .top-bar { position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #1A56DB 0%, rgba(26,86,219,0.2) 70%, transparent 100%); }

  /* Header dentro da safe zone */
  .header {
    position: absolute; top: 180px; left: 88px; right: 88px;
    display: flex; align-items: center; gap: 20px;
  }
  .avatar {
    width: 64px; height: 64px; border-radius: 50%;
    border: 2px solid #2563EB; overflow: hidden; flex-shrink: 0;
    background: #1A56DB; display: flex; align-items: center;
    justify-content: center; font-size: 22px; font-weight: 700; color: white;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .hname { font-size: 22px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
  .check { width: 20px; height: 20px; background: #1A56DB; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; }
  .hhandle { font-size: 18px; color: #9BB3E8; margin-top: 3px; }

  /* Time stamp pill */
  .time-pill {
    position: absolute; top: 328px; left: 88px;
    display: inline-flex; align-items: center; gap: 12px;
    background: rgba(26,86,219,0.12); border: 1px solid rgba(26,86,219,0.35);
    border-radius: 8px; padding: 12px 24px;
  }
  .tdot { width: 10px; height: 10px; background: #1A56DB; border-radius: 50%; }
  .ttext { font-size: 22px; font-weight: 600; color: #9BB3E8; letter-spacing: 0.08em; text-transform: uppercase; }

  /* Content */
  .content { position: absolute; top: 422px; left: 88px; right: 88px; }
  .body { font-size: 38px; font-weight: 500; color: #9BB3E8; line-height: 1.6; }
  .body strong { color: #FFFFFF; font-weight: 700; }
  .body .big { font-size: 46px; }

  .bottom-line {
    position: absolute; top: 900px; left: 88px; right: 88px;
    border-left: 6px solid #1A56DB; padding: 28px 36px;
    background: rgba(26,86,219,0.07); border-radius: 0 8px 8px 0;
    font-size: 40px; font-weight: 700; color: #FFFFFF; line-height: 1.3;
  }

  /* Bottom bar — fora da safe zone (decorativo) */
  .bottom { position: absolute; bottom: 52px; left: 88px; right: 88px; display: flex; justify-content: space-between; align-items: center; }
  .slide-num { font-size: 20px; font-weight: 600; color: #1E2E4A; letter-spacing: 0.08em; }
  .wm { font-size: 22px; font-weight: 500; color: #3A4D6E; }
</style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="header">
    <div class="avatar"><img src="../../2026-04-07/avatar.jpg" alt="K" onerror="this.style.display='none'"></div>
    <div>
      <div class="hname">Kalid Carvalho <div class="check">✓</div></div>
      <div class="hhandle">@eukalidcarvalho</div>
    </div>
  </div>

  <div class="time-pill">
    <div class="tdot"></div>
    <span class="ttext">Terça-feira — 22h14</span>
  </div>

  <div class="content">
    <p class="body">
      Ele tinha recebido uma notificação do banco<br>
      <strong>bloqueando a conta da empresa.</strong><br><br>
      Precisava de um advogado.<br>
      Não era curiosidade.<br>
      <strong>Era urgência real.</strong><br><br>
      Abriu o Google. Pesquisou.
    </p>
  </div>

  <div class="bottom-line">
    <strong>O seu escritório apareceu.</strong>
  </div>

  <div class="bottom">
    <span class="slide-num">02 / 08</span>
    <span class="wm">@eukalidcarvalho</span>
  </div>
</body>
</html>
