<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 01</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1350px;
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden; position: relative;
  }

  .bg {
    position: absolute; inset: 0;
    background-image: url('../capa.png');
    background-size: cover;
    background-position: center 68%;
  }

  .overlay {
    position: absolute; inset: 0;
    background:
      linear-gradient(
        to bottom,
        rgba(7,11,24,0.88) 0%,
        rgba(7,11,24,0.50) 28%,
        rgba(7,11,24,0.32) 50%,
        rgba(7,11,24,0.75) 74%,
        rgba(7,11,24,0.97) 100%
      );
  }

  .top-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #1A56DB 0%, rgba(26,86,219,0.3) 60%, transparent 100%);
  }

  /* Header padrão — igual slides 02-08 */
  .header {
    position: absolute; top: 180px; left: 88px; right: 88px;
    display: flex; align-items: center; gap: 20px;
  }
  .avatar {
    width: 64px; height: 64px; border-radius: 50%;
    border: 2px solid #2563EB; overflow: hidden; flex-shrink: 0;
    background: #1A56DB; display: flex; align-items: center;
    justify-content: center; font-size: 22px; font-weight: 700; color: white;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .hname {
    font-size: 22px; font-weight: 700; color: #FFFFFF;
    display: flex; align-items: center; gap: 8px;
  }
  .check {
    width: 20px; height: 20px; background: #1A56DB; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: white;
  }
  .hhandle { font-size: 18px; color: #9BB3E8; margin-top: 3px; }

  /* Badge abaixo do header */
  .badge {
    position: absolute; top: 320px; left: 88px;
    background: rgba(26,86,219,0.2);
    border: 1px solid rgba(26,86,219,0.5);
    border-radius: 6px;
    padding: 10px 20px;
    font-size: 20px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: #6B9BF0;
  }

  /* Conteúdo principal — base do slide */
  .content {
    position: absolute;
    bottom: 160px; left: 88px; right: 88px;
  }

  .pre {
    font-size: 26px; font-weight: 400; color: #9BB3E8;
    margin-bottom: 28px;
  }

  .headline {
    font-size: 74px; font-weight: 800; color: #FFFFFF;
    line-height: 1.06; letter-spacing: -0.03em; margin-bottom: 40px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  .headline .accent { color: #1A56DB; }

  .divider {
    width: 64px; height: 5px;
    background: #1A56DB; border-radius: 3px; margin-bottom: 36px;
  }

  .sub {
    font-size: 40px; font-weight: 600; color: #FFFFFF;
    line-height: 1.3; letter-spacing: -0.01em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  .bottom {
    position: absolute; bottom: 56px; left: 88px; right: 88px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .slide-num { font-size: 20px; font-weight: 600; color: rgba(58,77,110,0.8); letter-spacing: 0.08em; }
  .wm { font-size: 22px; font-weight: 500; color: rgba(155,179,232,0.6); }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="top-bar"></div>

  <div class="header">
    <div class="avatar">
      <img src="../../2026-04-07/avatar.jpg" alt="Kalid" onerror="this.style.display='none'">
    </div>
    <div>
      <div class="hname">Kalid Carvalho <div class="check">✓</div></div>
      <div class="hhandle">@eukalidcarvalho</div>
    </div>
  </div>

  <div class="badge">Marketing Jurídico</div>

  <div class="content">
    <p class="pre">Uma história que acontece todo dia.</p>
    <h1 class="headline">
      O lead ideal entrou<br>no seu site<br>
      <span class="accent">ontem à noite.</span>
    </h1>
    <div class="divider"></div>
    <p class="sub">O que aconteceu<br>depois disso?</p>
  </div>

  <div class="bottom">
    <span class="slide-num">01 / 08</span>
    <span class="wm">@eukalidcarvalho</span>
  </div>
</body>
</html>
